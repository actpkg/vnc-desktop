name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: moonrepo/setup-rust@v1
        with:
          bins: just, wasm-tools, wkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node (for npx @actcore/*)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Fetch WIT deps
        run: just init

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test (host)
        run: cargo test --target x86_64-unknown-linux-gnu --release

      - name: cargo build (wasm)
        run: just build

      - name: act-build pack
        run: just pack

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: component
          path: target/wasm32-wasip2/release/component_vnc_desktop.wasm

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: component
          path: target/wasm32-wasip2/release/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: moonrepo/setup-rust@v1
        with:
          bins: just, wkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: just init

      - name: Install Xvfb + x11vnc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb x11vnc xdotool

      - name: Launch Xvfb + x11vnc on :99
        run: |
          Xvfb :99 -screen 0 1024x768x24 -nolisten tcp &
          export DISPLAY=:99
          # Give Xvfb a moment to come up. (Cheap; X has no readiness probe.)
          for _ in $(seq 1 20); do xdpyinfo >/dev/null 2>&1 && break; sleep 0.5; done
          x11vnc -display :99 -nopw -localhost -listen 127.0.0.1 -forever -shared -bg
          # Wait for x11vnc to accept TCP.
          for _ in $(seq 1 20); do
            (echo > /dev/tcp/127.0.0.1/5900) >/dev/null 2>&1 && break
            sleep 0.5
          done
        shell: bash

      - name: e2e (hurl)
        env:
          VNC_HOST: 127.0.0.1
          VNC_PORT: '5900'
        run: just test

  publish:
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read      # checkout
      id-token: write     # keyless cosign signing via GitHub OIDC
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: component
          path: target/wasm32-wasip2/release/
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: moonrepo/setup-rust@v1
        with:
          bins: just, wkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: just init
      - uses: sigstore/cosign-installer@v4.1.2   # defaults to cosign 3.x → OCI 1.1 referrer signatures
      - name: publish
        id: publish
        env:
          # actpkg.dev PAT (any username; the registry detects the PAT by prefix).
          OCI_USERNAME: __token__
          OCI_PASSWORD: ${{ secrets.ACTPKG_TOKEN }}
          ACT_SOURCE: ${{ github.server_url }}/${{ github.repository }}
        run: just publish
      - name: Sign (keyless via GitHub OIDC)
        if: steps.publish.outputs.digest != ''
        env:
          ACTPKG_TOKEN: ${{ secrets.ACTPKG_TOKEN }}
          SUBJECT: ${{ steps.publish.outputs.image }}@${{ steps.publish.outputs.digest }}
        run: |
          echo "$ACTPKG_TOKEN" | cosign login actpkg.dev -u __token__ --password-stdin
          cosign sign --yes "$SUBJECT"
